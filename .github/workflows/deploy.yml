name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            if [ ! -d /opt/sorvancy-bot/.git ]; then
              git clone git@github.com:Arrisio/sorvancy-bot.git /opt/sorvancy-bot
            fi
            cd /opt/sorvancy-bot
            git pull
            docker compose up -d --build
